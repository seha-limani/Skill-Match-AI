spring.application.name=SkillMatch-AI

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:skillmatchdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:change-this-development-secret-please-change}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.ai-service-url=${AI_SERVICE_URL:http://localhost:8000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
